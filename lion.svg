<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- Mane: overlapping ellipses rotated around face center -->
  <g transform="translate(150, 158)">
    <ellipse rx="20" ry="98" fill="#7A5800" transform="rotate(0)"/>
    <ellipse rx="20" ry="98" fill="#9A7010" transform="rotate(30)"/>
    <ellipse rx="20" ry="98" fill="#7A5800" transform="rotate(60)"/>
    <ellipse rx="20" ry="98" fill="#9A7010" transform="rotate(90)"/>
    <ellipse rx="20" ry="98" fill="#7A5800" transform="rotate(120)"/>
    <ellipse rx="20" ry="98" fill="#9A7010" transform="rotate(150)"/>
  </g>

  <!-- Ears (behind face, above mane) -->
  <ellipse cx="108" cy="80" rx="22" ry="28" fill="#9A7010" transform="rotate(-8 108 80)"/>
  <ellipse cx="192" cy="80" rx="22" ry="28" fill="#9A7010" transform="rotate(8 192 80)"/>
  <ellipse cx="108" cy="82" rx="13" ry="17" fill="#DAA520" transform="rotate(-8 108 82)"/>
  <ellipse cx="192" cy="82" rx="13" ry="17" fill="#DAA520" transform="rotate(8 192 82)"/>

  <!-- Face -->
  <circle cx="150" cy="158" r="72" fill="#DAA520"/>

  <!-- Brow shadow -->
  <ellipse cx="150" cy="135" rx="48" ry="14" fill="#C89010" opacity="0.35"/>

  <!-- Eyes -->
  <ellipse cx="118" cy="143" rx="15" ry="13" fill="#1C0D00"/>
  <ellipse cx="182" cy="143" rx="15" ry="13" fill="#1C0D00"/>
  <ellipse cx="118" cy="143" rx="10" ry="11" fill="#8B5E00"/>
  <ellipse cx="182" cy="143" rx="10" ry="11" fill="#8B5E00"/>
  <ellipse cx="118" cy="143" rx="5" ry="8" fill="#1C0D00"/>
  <ellipse cx="182" cy="143" rx="5" ry="8" fill="#1C0D00"/>
  <circle cx="121" cy="140" r="3" fill="white" opacity="0.9"/>
  <circle cx="185" cy="140" r="3" fill="white" opacity="0.9"/>

  <!-- Muzzle pads -->
  <ellipse cx="128" cy="175" rx="23" ry="17" fill="#E8C040" opacity="0.45"/>
  <ellipse cx="172" cy="175" rx="23" ry="17" fill="#E8C040" opacity="0.45"/>

  <!-- Nose -->
  <path d="M 141 163 Q 150 159 159 163 L 155 173 Q 150 177 145 173 Z" fill="#4A2008"/>

  <!-- Philtrum -->
  <line x1="150" y1="173" x2="150" y2="180" stroke="#4A2008" stroke-width="2"/>

  <!-- Mouth -->
  <path d="M 135 180 Q 150 192 165 180" stroke="#4A2008" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Whisker dots -->
  <circle cx="105" cy="172" r="2.5" fill="#7A5800"/>
  <circle cx="113" cy="179" r="2.5" fill="#7A5800"/>
  <circle cx="124" cy="182" r="2.5" fill="#7A5800"/>
  <circle cx="195" cy="172" r="2.5" fill="#7A5800"/>
  <circle cx="187" cy="179" r="2.5" fill="#7A5800"/>
  <circle cx="176" cy="182" r="2.5" fill="#7A5800"/>
</svg>
